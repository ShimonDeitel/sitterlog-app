<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Babysitter Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0E1116; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.4rem; color:#E07A5F; margin-bottom:8px; }
  p.tag { font-size:1.15rem; color:#ccc; margin-bottom:32px; }
  .badge { display:inline-block; padding:8px 18px; border-radius:999px; background:#3D5A80; color:#111; font-weight:600; margin-bottom:24px; }
  a { color:#E07A5F; text-decoration:none; }
  footer { margin-top:40px; font-size:0.85rem; color:#888; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E07A5F55 0%, #E07A5F00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <div class="badge">Now on iOS</div>
  <h1>Babysitter Log</h1>
  <p class="tag">Track babysitter hours, pay rate and notes left for each visit.</p>
  <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
