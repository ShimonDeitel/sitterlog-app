name: BabysitterLog
options:
  bundleIdPrefix: com.shimondeitel.sitterlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BabysitterLog:
    type: application
    platform: iOS
    sources:
      - path: BabysitterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BabysitterLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabysitterLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabysitterLogTests
      - path: BabysitterLog.storekit
    dependencies:
      - target: BabysitterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabysitterLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabysitterLogUITests
    dependencies:
      - target: BabysitterLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BabysitterLog:
    build:
      targets:
        BabysitterLog: all
        BabysitterLogTests: [test]
        BabysitterLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BabysitterLog.storekit
    test:
      config: Debug
      storeKitConfiguration: BabysitterLog.storekit
      targets:
        - BabysitterLogTests
        - BabysitterLogUITests
    archive:
      config: Release
